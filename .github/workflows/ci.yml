name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  hygiene:
    name: Public Tree Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for unsafe public artifacts
        run: |
          unsafe="$(git ls-files | grep -E '(^|/)(\.env|\.env\..*|.*\.pem|.*\.key|.*cookie.*|.*cookies.*|.*\.dump|.*\.log|.*\.sqlite3?|data/|logs/|screenshots/)' | grep -v '^\.env\.example$' || true)"
          if [ -n "$unsafe" ]; then
            echo "$unsafe"
            echo "Tracked public tree contains local/private/generated artifacts."
            exit 1
          fi

      - name: Check whitespace
        run: git diff --check

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run python -m compileall backend tests
      - run: uv audit
      - run: uv run pip-audit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [hygiene]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm audit --audit-level=moderate

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v4
      - name: Check for obvious committed secrets
        run: |
          if git ls-files -z | xargs -0 grep -InE '(sk-or-v1-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{20,}|BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY)'; then
            echo "Potential secret detected."
            exit 1
          fi
